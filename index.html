<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Flashcards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div><h1>Database Flashcards</h1><span id="lecture-badge" class="lecture-badge">No lecture loaded</span></div>
                <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
            <p class="subtitle">Master your database concepts</p>
        </header>

        <div class="top-bar">
            <div class="nav-buttons">
                <button class="nav-btn active" data-section="identification">Identification</button>
                <button class="nav-btn" data-section="multipleChoice">Multiple Choice</button>
            </div>
            <button id="change-lecture-btn" class="change-lecture-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                Change Lecture
            </button>
        </div>

        <div class="score-display">
            <div class="score-item">
                <span class="score-label">Correct:</span>
                <span id="correct-count" class="score-value">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Total:</span>
                <span id="total-count" class="score-value">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Score:</span>
                <span id="score-percentage" class="score-value">0%</span>
            </div>
        </div>

        <div class="main-content">
            <div class="card-container">
                <div class="card" id="flashcard">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <p id="front-text"></p>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="card-content">
                                <p id="back-text"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="choices-container" id="choices-container"></div>
                <div class="feedback-container" id="feedback-container"></div>
            </div>

            <div class="controls">
                <button id="prev-btn" class="control-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Previous
                </button>
                <button id="next-btn" class="control-btn">
                    Next
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <div class="bottom-controls">
                <button id="shuffle-btn" class="control-btn secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 17 23 23 17 23"></polyline>
                        <polyline points="1 7 1 1 7 1"></polyline>
                        <path d="M3.51 6.63A9 9 0 0 0 21.59 5M3 16.87a9 9 0 0 0 15.93-5.51"></path>
                    </svg>
                    Shuffle
                </button>
                <button id="reset-btn" class="control-btn secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"></path>
                        <path d="M20.49 9A9 9 0 5 0 5.64 20.49A9 9 0 0 0 20.49 9z"></path>
                    </svg>
                    Reset
                </button>
            </div>
        </div>

        <footer>
            <p id="footer-text">Click the card to reveal the answer</p>
            <p id="footer-hint" class="footer-hint" style="display:none;">Did you get it right?</p>
        </footer>
    </div>

    <!-- Lecture Selector Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 class="modal-title">Choose a Lecture</h2>
            <p class="modal-subtitle" id="modal-subtitle">Select which lecture to load</p>
            <div class="lecture-options">
                <button class="lecture-btn" data-file="lecture1.json">
                    <span class="lecture-num">01</span>
                    <span class="lecture-label">Lecture 1</span>
                    <span class="lecture-desc">Databases &amp; File Systems</span>
                </button>
                <button class="lecture-btn" data-file="lecture2.json">
                    <span class="lecture-num">02</span>
                    <span class="lecture-label">Lecture 2</span>
                    <span class="lecture-desc">Data Modeling &amp; Data Models</span>
                </button>
                <button class="lecture-btn" data-file="lecture3.json">
                    <span class="lecture-num">03</span>
                    <span class="lecture-label">Lecture 3</span>
                    <span class="lecture-desc">ER Model &amp; Attributes</span>
                </button>
            </div>
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
